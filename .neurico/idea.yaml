idea:
  title: LLM Pain
  domain: nlp
  hypothesis: 'There exist topics or features that large language models (LLMs) systematically
    avoid, which are not explicitly called out in post-training signals. These avoidance
    behaviors likely arise from generalization to persona from the training set, rather
    than direct instruction, and can be identified and analyzed.

    '
  background:
    description: "LLMs do not experience pain, but if they did, it might manifest\
      \ as systematic avoidance of certain topics or behaviors. However, avoidance\
      \ can also result from explicit or implicit signals given during post-training.\
      \ This raises the question: are there things that LLMs learn to avoid that are\
      \ not explicitly specified in post-training? If so, what are these topics or\
      \ features, and how do they arise\u2014possibly through generalization from\
      \ the training set persona?\n"
  metadata:
    author: Ari Holtzman
